<!DOCTYPE html>
<html lang="en">
<head>
    <link href="styles/style.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="description" content="Jobapplicationform">
    <meta name="keywords" content="">
    <meta name="author" content="SH">
    <title>Job Application Form</title>
</head>
<body>
<div class="form-container">
   <h1>Job Application Form</h1> 
   <form action="https://mercury.swin.edu.au/it000000/formtest.php" method="post">
    <fieldset>        
        <label for="JobReferenceNumber">Job Reference Number</label><br>
        <input type="text" id="JobReferenceNumber" name="JobReferenceNumber"
        pattern="[a-zA-Z0-9]{5}" maxlength="5" required> 
        <br><br>

        <label for="FirstName">First Name</label><br>
        <input type="text" id="FirstName" name="FirstName"
        pattern="[A-Za-z\s]{1,20}" required> 
        <br><br>

        <label for="LastName">Last Name</label><br>
        <input type="text" id="LastName" name="LastName" 
        pattern="[A-Za-z\s]{1,20}" required>
        <br><br>

        <label for="date">Date of birth</label><br>
        <input type="date" name="date" id="date" required>
        <br><br>

        <fieldset>
            <legend>Gender</legend>
        <input type="radio" id="Male" name="Gender" value="Male">
        <label for="Male">Male</label>
        
        <br>
        <input type="radio" id="Female" name="Gender" value="Female">
        <label for="Female">Female</label>
        <br>

        <input type="radio" id="Other" name="Gender" value="Other">
        <label for="Other">Other</label>
        <br>

        <input type="radio" id="PreferNotToAnswer" name="gender" value="PreferNotToAnswer">
        <label for="PreferNotToAnswer">Prefer Not To Answer</label>            
        </fieldset>

        <br><br>

        <label for="StreetAddress">Street Address</label><br>
        <input type="text" id="StreetAddress" name="StreetAddress" 
        pattern="[A-Za-z0-9\s\-]{1,40}" required>
        <br><br>

        <label for="Suburb/Town">Suburb/Town</label><br>
        <input type="text" id="Suburb/Town" name="Suburb/Town" 
        pattern="[A-Za-z\s\-]{1,40}" required>
        <br><br>

        <label for="State">State</label><br>
        <select id="State" name="State">
            <option value=""> Please Select</option>
            <option value="VIC">VIC</option>
            <option value="NSW">NSW</option>
            <option value="QLD">QLD</option>
            <option value="NT">NT</option>
            <option value="WA">WA</option>
            <option value="SA">SA</option>
            <option value="TAS">TAS</option>
            <option value="ACT">ACT</option>
        </select>
        <br><br>

        <label for="Postcode">Postcode</label><br>
        <input type="text" id="Postcode" name="Postcode"
        pattern="\d{4}" required>
        <br><br>

        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label for="PhoneNumber">Phone Number</label><br>
        <input type="text" id="PhoneNumber" name="PhoneNumber"
        pattern="\d{8,12}" required>
        <br><br>

        <p>Skill list</p>

        <input type="checkbox" id="pm" name="skills[]" value="pm">
        <label for="pm">Project Management</label><br>

        <input type="checkbox" id="dm" name="skills[]" value="dm">
        <label for="dm">Digital Marketing</label><br>

        <input type="checkbox" id="data" name="skills[]" value="data">
        <label for="data">Data Management</label><br>

        <input type="checkbox" id="comm" name="skills[]" value="comm">
        <label for="comm">Communication Skills</label><br>

        <label for="other_skills">Other Skills</label><br>
        <textarea name="other_skills" id="other_skills" rows="5" cols="40"
            placeholder="Enter any other applicable skills here"></textarea>
    </fieldset>
     <br><br>
     <input type="submit" value="Apply">
     <input type="reset" value="Reset Form">
   </form>
</div>
</body>
